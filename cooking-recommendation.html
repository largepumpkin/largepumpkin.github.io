<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能做菜推荐助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .chat-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: visible;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            margin-bottom: 15px;
            position: relative;
            min-height: 0;
        }
        
        .chat-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            color: #6c757d;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px;
            margin: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
        }
        
        .placeholder-icon {
            font-size: 48px;
            margin-right: 20px;
            opacity: 0.6;
        }
        
        .placeholder-text {
            text-align: left;
        }
        
        .placeholder-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
        }
        
        .placeholder-hint {
            font-size: 14px;
            line-height: 1.4;
            opacity: 0.8;
        }

        .chat-header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 15px;
        }

        .chat-header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            color: #999;
            font-size: 14px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 15px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.bot .message-content {
            background: #f0f0f0;
            color: #333;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .chat-input::placeholder {
            color: #6c757d;
            opacity: 1;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .result-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-header h2 {
            color: #667eea;
            font-size: 20px;
        }

        .card-header .icon {
            font-size: 24px;
        }

        .dish-recommendation {
            flex: 1;
            overflow-y: auto;
        }

        .dish-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }

        .dish-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .dish-card.selected {
            border: 2px solid #667eea;
            background: linear-gradient(135deg, #e8eaf6 0%, #c5cae9 100%);
        }

        .dish-card h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .dish-card .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .dish-card .description {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .nutrition-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .nutrition-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .nutrition-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .nutrition-item .label {
            color: #999;
            font-size: 12px;
        }

        .recipe-steps {
            flex: 1;
            overflow-y: auto;
        }

        .step {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .step-number {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .step-content {
            flex: 1;
        }

        .step-content h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .step-content p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .ingredients-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .ingredient {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
        }

        .quick-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .quick-button {
            background: #f0f0f0;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }

        .quick-button:hover {
            background: #667eea;
            color: white;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .dish-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .dish-action-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .dish-action-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .dish-image-container {
            width: 100%;
            height: 200px;
            margin-bottom: 10px;
            position: relative;
        }

        .dish-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            transition: transform 0.3s ease;
            display: block;
        }

        .dish-card:hover .dish-image {
            transform: scale(1.05);
        }

        .dish-image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .video-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 15px;
            cursor: pointer;
            border: none;
        }

        .video-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .video-link .icon {
            font-size: 20px;
        }

        .video-container {
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        .video-container iframe {
            width: 100%;
            height: 300px;
            border: none;
            display: block;
        }

        .step-video {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .step-video a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .step-video a:hover {
            text-decoration: underline;
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .image-gallery img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .image-gallery img:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
        }
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.5);
    }
    
    .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .modal-content {
        background-color: #fff;
        border-radius: 16px;
        padding: 24px;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        position: relative;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    
    .modal-close {
        position: absolute;
        right: 16px;
        top: 16px;
        font-size: 28px;
        font-weight: bold;
        color: #999;
        cursor: pointer;
        line-height: 1;
    }
    
    .modal-close:hover {
        color: #333;
    }
    
    .modal-title {
        font-size: 22px;
        font-weight: bold;
        margin: 0;
        color: #333;
        padding-right: 40px;
    }
    
    .user-input-form {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border-radius: 20px;
        padding: 0;
        margin-bottom: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    
    .form-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 24px;
        text-align: center;
    }
    
    .form-header h3 {
        margin: 0 0 8px 0;
        font-size: 20px;
        font-weight: 600;
    }
    
    .form-header p {
        margin: 0;
        font-size: 14px;
        opacity: 0.9;
    }
    
    .form-content {
        padding: 24px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 10px;
        font-weight: 600;
        color: #333;
        font-size: 14px;
    }
    
    .form-input,
    .form-textarea {
        width: 100%;
        padding: 14px;
        border: 2px solid #e9ecef;
        border-radius: 10px;
        font-size: 14px;
        transition: all 0.3s ease;
        background: white;
    }
    
    .form-input:focus,
    .form-textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .form-textarea {
        resize: vertical;
        min-height: 120px;
    }
    
    .file-upload {
        position: relative;
    }
    
    .file-input {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
        z-index: 2;
    }
    
    .file-label {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px;
        border: 2px dashed #ced4da;
        border-radius: 10px;
        background: #f8f9fa;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
    }
    
    .file-label:hover {
        border-color: #667eea;
        background: #f0f4ff;
    }
    
    .file-icon {
        font-size: 40px;
        margin-bottom: 10px;
    }
    
    .file-text {
        font-size: 14px;
        color: #6c757d;
        margin-bottom: 8px;
    }
    
    .file-name {
        font-size: 12px;
        color: #495057;
        font-weight: 500;
        word-break: break-all;
    }
    
    .form-hint {
        display: block;
        margin-top: 8px;
        font-size: 12px;
        color: #6c757d;
    }
    
    .form-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
    }
    
    .submit-button {
        flex: 1;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    
    .submit-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    
    .reset-button {
        flex: 0 0 auto;
        background: #f8f9fa;
        color: #495057;
        border: 2px solid #dee2e6;
        padding: 14px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }
    
    .reset-button:hover {
        background: #e9ecef;
        border-color: #adb5bd;
    }
    
    .export-button, .import-button, .update-button {
        flex: 0 0 auto;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }
    
    .export-button:hover, .import-button:hover, .update-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .button-icon {
            font-size: 16px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e9ecef, transparent);
        }
        
        .divider span {
            padding: 0 20px;
            background: white;
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            position: relative;
            z-index: 1;
        }
        
        .divider::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e9ecef, transparent);
        }
    
    .nutrition-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-top: 16px;
    }
    
    .nutrition-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 16px;
        border-radius: 12px;
        text-align: center;
    }
    
    .nutrition-card .value {
        font-size: 28px;
        font-weight: bold;
    }
    
    .nutrition-card .label {
        font-size: 14px;
        margin-top: 4px;
        opacity: 0.9;
    }
    
    .nutrition-tip {
        margin-top: 20px;
        padding: 16px;
        background: #f8f9fa;
        border-radius: 12px;
        color: #666;
        line-height: 1.6;
    }
    
    .recipe-ingredients {
        margin-bottom: 20px;
    }
    
    .recipe-ingredients h4 {
        color: #333;
        margin-bottom: 12px;
    }
    
    .ingredient-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }
    
    .ingredient-tag {
        background: #e8f5e9;
        color: #2e7d32;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 14px;
    }
    
    .recipe-steps {
        margin-top: 20px;
    }
    
    .recipe-step {
        display: flex;
        gap: 16px;
        margin-bottom: 16px;
        padding: 16px;
        background: #f8f9fa;
        border-radius: 12px;
    }
    
    .recipe-step-number {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        flex-shrink: 0;
    }
    
    .recipe-step-content h4 {
        margin: 0 0 8px 0;
        color: #333;
        font-size: 16px;
    }
    
    .recipe-step-content p {
        margin: 0;
        color: #666;
        line-height: 1.5;
    }
    
    .recipe-tip {
        margin-top: 20px;
        padding: 16px;
        background: #fff3e0;
        border-radius: 12px;
        color: #e65100;
        line-height: 1.6;
    }
    
    .shopping-tip {
        margin-bottom: 20px;
        padding: 12px 16px;
        background: #e3f2fd;
        border-radius: 10px;
        color: #1565c0;
        font-size: 14px;
        line-height: 1.5;
    }
    
    .shopping-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
    }
    
    .shopping-item {
        display: flex;
        align-items: center;
        padding: 12px;
        background: #f8f9fa;
        border-radius: 10px;
        border-left: 4px solid #667eea;
        transition: transform 0.2s;
    }
    
    .shopping-item:hover {
        transform: translateX(5px);
        background: #e9ecef;
    }
    
    .shopping-item-icon {
        font-size: 24px;
        margin-right: 12px;
    }
    
    .shopping-item-info {
        flex: 1;
    }
    
    .shopping-item-name {
        font-size: 14px;
        font-weight: 600;
        color: #333;
        margin-bottom: 4px;
    }
    
    .shopping-item-amount {
        font-size: 13px;
        color: #666;
    }
    
    .shopping-summary {
        display: flex;
        align-items: center;
        padding: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 12px;
        color: white;
    }
    
    .summary-icon {
        font-size: 28px;
        margin-right: 16px;
    }
    
    .summary-text {
        font-size: 14px;
        line-height: 1.5;
    }
    
    .suitable-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 20px;
    }
    
    .suitable-item {
        display: flex;
        align-items: center;

        let currentDish = null;

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            setTimeout(() => {
                processMessage(message);
            }, 500);
        }

        function sendQuickMessage(message) {
            document.getElementById('chatInput').value = message;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function addMessage(content, type) {
            const messagesDiv = document.getElementById('chatMessages');
            
            // 隐藏提示词
            const placeholder = messagesDiv.querySelector('.chat-placeholder');
            if (placeholder) {
                placeholder.style.display = 'none';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

            let response = '';

            // 检查是否是具体的菜名（精确匹配）

        // 弹窗拖拽功能
        function makeModalDraggable(modalId) {
            const modal = document.getElementById(modalId);
            const modalContent = modal.querySelector('.modal-content');
            let isDragging = false;
            let offsetX, offsetY;
            
            modalContent.addEventListener('mousedown', function(e) {
                isDragging = true;
                offsetX = e.clientX - modalContent.getBoundingClientRect().left;
                offsetY = e.clientY - modalContent.getBoundingClientRect().top;
                modalContent.style.cursor = 'grabbing';
            });
            
            document.addEventListener('mousemove', function(e) {
                if (isDragging) {
                    const x = e.clientX - offsetX;
                    const y = e.clientY - offsetY;
                    
                    // 限制在视口内
                    const maxX = window.innerWidth - modalContent.offsetWidth;
                    const maxY = window.innerHeight - modalContent.offsetHeight;
                    
                    const boundedX = Math.max(0, Math.min(x, maxX));
                    const boundedY = Math.max(0, Math.min(y, maxY));
                    
                    modalContent.style.left = boundedX + 'px';
                    modalContent.style.top = boundedY + 'px';
                    modalContent.style.position = 'absolute';
                }
            });
            
            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    modalContent.style.cursor = 'move';
                }
            });
        }

        // 从localStorage加载自定义菜品
        function loadCustomDishes() {
            const savedDishes = localStorage.getItem('customDishes');
            if (savedDishes) {
                const customDishes = JSON.parse(savedDishes);
                // 确保家常菜类别存在
                if (!dishes['家常菜']) {
                    dishes['家常菜'] = [];
                }
                // 合并自定义菜品，去重
                customDishes.forEach(customDish => {
                    const existingIndex = dishes['家常菜'].findIndex(dish => dish.name === customDish.name);
                    if (existingIndex !== -1) {
                        // 替换为保存的信息
                        dishes['家常菜'][existingIndex] = customDish;
                    } else {
                        // 添加新菜品
                        dishes['家常菜'].push(customDish);
                    }
                });
            }
        }

            // 提取自定义菜品
            const customDishes = (dishes['家常菜'] || []).filter(dish => dish.tags && dish.tags.includes('自定义'));
            localStorage.setItem('customDishes', JSON.stringify(customDishes));

        // 评分相关功能
        let dishRatings = {};

        function loadDishRatings() {
            const saved = localStorage.getItem('dishRatings');
            if (saved) {
                dishRatings = JSON.parse(saved);
            }
            // 初始化所有菜品的评分
            Object.values(dishes).flat().forEach(dish => {
                if (!dishRatings[dish.name]) {
                    dishRatings[dish.name] = { score: 0, liked: false, disliked: false, likeCount: 0, dislikeCount: 0 };
                } else {
                    // 确保旧数据有likeCount和dislikeCount
                    if (dishRatings[dish.name].likeCount === undefined) {
                        dishRatings[dish.name].likeCount = 0;
                    }
                    if (dishRatings[dish.name].dislikeCount === undefined) {
                        dishRatings[dish.name].dislikeCount = 0;
                    }
                }
            });
            loadRatingHistory();
        }
        
        function saveDishRatings() {
            localStorage.setItem('dishRatings', JSON.stringify(dishRatings));
        }
        
        function loadRatingHistory() {
            const saved = localStorage.getItem('ratingHistory');
            if (saved) {
                ratingHistory = JSON.parse(saved);
            }
        }
        
        function saveRatingHistory() {
            localStorage.setItem('ratingHistory', JSON.stringify(ratingHistory));
        }
        
        function addRatingHistory(dishName, prevState, newState) {
            const entry = {
                dishName: dishName,
                prevState: prevState,
                newState: newState,
                timestamp: new Date().toISOString()
            };
            ratingHistory.push(entry);
            saveRatingHistory();
        }
        
        function getDishScore(dishName) {
            return dishRatings[dishName] ? dishRatings[dishName].score : 0;
        }
        
        function rateDish(dishName, isLike) {
            if (!dishRatings[dishName]) {
                dishRatings[dishName] = { score: 0, liked: false, disliked: false, likeCount: 0, dislikeCount: 0 };
            }
            
            const rating = dishRatings[dishName];
            const prevScore = rating.score;
            
            if (isLike) {
                rating.liked = true;
                rating.disliked = false;
                rating.likeCount++;
                rating.score = rating.likeCount - rating.dislikeCount;
            } else {
                rating.disliked = true;
                rating.liked = false;
                rating.dislikeCount++;
                rating.score = rating.likeCount - rating.dislikeCount;
            }
            
            saveDishRatings();
            addRatingHistory(dishName, prevScore, rating.score);
            updateDishRatingUI(dishName);
            showTopDishes();
            showTopDishesInRecommendation();
        }
        
        function updateDishRatingUI(dishName) {
            const rating = dishRatings[dishName];
            if (!rating) return;
            
            const likeBtn = document.querySelector(`[data-dish-like="${dishName}"]`);
            const dislikeBtn = document.querySelector(`[data-dish-dislike="${dishName}"]`);
            const scoreSpan = document.querySelector(`[data-dish-score="${dishName}"]`);
            
            if (likeBtn) {
                likeBtn.classList.toggle('liked', rating.liked);
            }
            if (dislikeBtn) {
                dislikeBtn.classList.toggle('disliked', rating.disliked);
            }
            if (scoreSpan) {
                scoreSpan.textContent = rating.score > 0 ? '+' + rating.score : rating.score;
                scoreSpan.classList.remove('score-positive', 'score-negative');
                if (rating.score > 0) {
                    scoreSpan.classList.add('score-positive');
                } else if (rating.score < 0) {
                    scoreSpan.classList.add('score-negative');
                }
            }
        }

            `;
            
            // 更新评分UI
            topDishes.forEach(dish => {
                updateDishRatingUI(dish.name);
            });
        }

        function addCustomDish() {
            const dishName = document.getElementById('dishName').value.trim();
            const dishSteps = document.getElementById('dishSteps').value.trim();
            const fileInput = document.getElementById('dishImageUpload');
            
            if (!dishName) {
                alert('请输入菜品名称！');
                return;
            }
            
            // 生成步骤
            let steps = [];
            if (dishSteps) {
                const stepTexts = dishSteps.split('\n').filter(step => step.trim());
                steps = stepTexts.map((text, index) => {
                    const titles = ['准备食材', '步骤1', '步骤2', '步骤3', '步骤4', '步骤5'];
                    return {
                        title: titles[index] || `步骤${index + 1}`,
                        content: text.trim(),
                        image: '🍳'
                    };
                });
            } else {
                // 自动生成步骤
                steps = [
                    { title: '准备食材', content: `准备${dishName}所需的食材。`, image: '🥬' },
                    { title: '处理食材', content: '将食材洗净切好。', image: '🔪' },
                    { title: '烹饪', content: `按照常规方法烹饪${dishName}。`, image: '🍳' },
                    { title: '调味', content: '根据个人口味调味。', image: '🧂' },
                    { title: '出锅', content: '烹饪完成，出锅装盘。', image: '🍽️' }
                ];
            }
            
            // 处理图片 - 将图片转为Base64
            const processImage = (file) => {
                return new Promise((resolve) => {
                    if (!file) {
                        // 自动生成图片
                        resolve(`https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${encodeURIComponent(dishName + ' chinese dish')}&image_size=landscape_4_3`);
                        return;
                    }
                    
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        resolve(e.target.result);
                    };
                    reader.readAsDataURL(file);
                });
            };
            
            // 根据菜名自动生成食材
            const generateIngredients = (name) => {
                const ingredients = [];
                const nameLower = name.toLowerCase();
                
                // 通用食材
                if (nameLower.includes('鸡丁') || nameLower.includes('鸡肉') || nameLower.includes('鸡')) {
                    ingredients.push('鸡肉 500g');
                    ingredients.push('葱姜 适量');
                    ingredients.push('料酒 1勺');
                    ingredients.push('盐 适量');
                }
                
                if (nameLower.includes('牛肉') || nameLower.includes('牛排') || nameLower.includes('牛')) {
                    ingredients.push('牛肉 500g');
                    ingredients.push('葱姜 适量');
                    ingredients.push('料酒 1勺');
                    ingredients.push('生抽 1勺');
                }
                
                if (nameLower.includes('鱼')) {
                    ingredients.push('鱼 1条');
                    ingredients.push('葱姜 适量');
                    ingredients.push('料酒 1勺');
                    ingredients.push('盐 适量');
                }
                
                if (nameLower.includes('猪肉') || nameLower.includes('排骨') || nameLower.includes('红烧肉')) {
                    ingredients.push('猪肉 500g');
                    ingredients.push('葱姜 适量');
                    ingredients.push('料酒 1勺');
                    ingredients.push('生抽 1勺');
                }
                
                if (nameLower.includes('番茄') || nameLower.includes('西红柿')) {
                    ingredients.push('番茄 2个');
                    if (nameLower.includes('炒蛋') || nameLower.includes('鸡蛋')) {
                        ingredients.push('鸡蛋 3个');
                        ingredients.push('盐 适量');
                        ingredients.push('糖 少许');
                    }
                }
                
                if (nameLower.includes('蛋') || nameLower.includes('鸡蛋')) {
                    if (!ingredients.some(ing => ing.includes('鸡蛋'))) {
                        ingredients.push('鸡蛋 3个');
                        ingredients.push('盐 适量');
                    }
                }
                
                if (nameLower.includes('豆腐')) {
                    ingredients.push('豆腐 1块');
                    ingredients.push('葱姜 适量');
                    ingredients.push('盐 适量');
                }
                
                if (nameLower.includes('蔬菜') || nameLower.includes('青菜') || nameLower.includes('白菜') || nameLower.includes('菠菜') || nameLower.includes('西兰花')) {
                    if (nameLower.includes('西兰花')) {
                        ingredients.push('西兰花 1颗');
                    } else if (nameLower.includes('白菜')) {
                        ingredients.push('白菜 1颗');
                    } else if (nameLower.includes('菠菜')) {
                        ingredients.push('菠菜 250g');
                    } else {
                        ingredients.push('青菜 250g');
                    }
                    ingredients.push('蒜 适量');
                    ingredients.push('盐 适量');
                }
                
                if (nameLower.includes('土豆') || nameLower.includes('马铃薯')) {
                    ingredients.push('土豆 2个');
                    ingredients.push('盐 适量');
                    if (nameLower.includes('青椒')) {
                        ingredients.push('青椒 1个');
                    }
                }
                
                if (nameLower.includes('青椒') || nameLower.includes('辣椒')) {
                    if (!ingredients.some(ing => ing.includes('青椒'))) {
                        ingredients.push('青椒 1个');
                    }
                }
                
                if (nameLower.includes('汤')) {
                    ingredients.push('清水 适量');
                    ingredients.push('盐 适量');
                }
                
                if (nameLower.includes('炒') || nameLower.includes('煎') || nameLower.includes('煮')) {
                    ingredients.push('食用油 适量');
                }
                
                // 如果没有生成任何食材，添加默认食材
                if (ingredients.length === 0) {
                    ingredients.push('主食材 500g');
                    ingredients.push('葱姜 适量');
                    ingredients.push('盐 适量');
                    ingredients.push('食用油 适量');
                }
                
                return ingredients;
            };
            
            // 异步处理图片并创建菜品
            processImage(fileInput.files[0]).then(image => {
                // 生成食材
                const ingredients = generateIngredients(dishName);
                
                // 创建新菜品
                const newDish = {
                    name: dishName,
                    tags: ['自定义'],
                    description: `用户自定义菜品：${dishName}`,
                    nutrition: { calories: 200, protein: 10, fat: 8, carbs: 15 },
                    ingredients: ingredients,
                    steps: steps,
                    image: image,
                    color: '#667eea'
                };
                
                // 确保家常菜类别存在
                if (!dishes['家常菜']) {
                    dishes['家常菜'] = [];
                }
                
                // 检查是否存在同名菜品
                const existingIndex = dishes['家常菜'].findIndex(dish => dish.name === dishName);
                
                if (existingIndex !== -1) {
                    // 替换为新的信息
                    dishes['家常菜'][existingIndex] = newDish;
                    addMessage(`已更新菜品【${dishName}】的信息！`, 'bot');
                } else {
                    // 添加新菜品
                    dishes['家常菜'].unshift(newDish);
                    addMessage(`已添加自定义菜品【${dishName}】！`, 'bot');
                }
                
                // 保存到localStorage
                saveCustomDishes();
                
                // 清空表单
                resetForm();
            });
        }
        
        function updateLocalJsonFile() {
            const customDishes = (dishes['家常菜'] || []).filter(dish => dish.tags && dish.tags.includes('自定义'));
            
            const exportData = {
                version: '2.0',
                exportDate: new Date().toISOString(),
                dishes: customDishes,
                ratings: Object.fromEntries(
                    Object.entries(dishRatings).filter(([name]) => 
                        customDishes.some(d => d.name === name)
                    )
                )
            };
            
            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'custom-dishes.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            addMessage('已更新本地 custom-dishes.json 文件！', 'bot');
        }

        function resetForm() {
            document.getElementById('dishName').value = '';
            document.getElementById('dishSteps').value = '';
            document.getElementById('dishImageUpload').value = '';
            document.getElementById('fileName').textContent = '';
        }

        function exportCustomDishes() {
            const customDishes = (dishes['家常菜'] || []).filter(dish => dish.tags && dish.tags.includes('自定义'));
            
            if (customDishes.length === 0) {
                addMessage('当前没有自定义菜品可以导出。', 'bot');
                return;
            }
            
            updateLocalJsonFile();
            addMessage(`已成功导出 ${customDishes.length} 个自定义菜品到 custom-dishes.json！`, 'bot');
        }

        function importCustomDishes(fileInput) {
            const file = fileInput.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importData = JSON.parse(e.target.result);
                    
                    if (!importData.dishes || !Array.isArray(importData.dishes)) {
                        addMessage('导入失败：文件格式不正确。', 'bot');
                        return;
                    }
                    
                    let importedCount = 0;
                    let updatedCount = 0;
                    
                    importData.dishes.forEach(dish => {
                        if (!dish.name) return;
                        
                        const existingIndex = dishes['家常菜'].findIndex(d => d.name === dish.name);
                        
                        if (existingIndex !== -1) {
                            dishes['家常菜'][existingIndex] = dish;
                            updatedCount++;
                        } else {
                            if (!dishes['家常菜']) {
                                dishes['家常菜'] = [];
                            }
                            dishes['家常菜'].unshift(dish);
                            importedCount++;
                        }
                        
                        if (importData.ratings && importData.ratings[dish.name]) {
                            dishRatings[dish.name] = importData.ratings[dish.name];
                        }
                    });
                    
                    saveCustomDishes();
                    saveDishRatings();
                    addMessage(`导入完成：新增 ${importedCount} 个菜品，更新 ${updatedCount} 个菜品。`, 'bot');
                    
                    if (importedCount > 0 || updatedCount > 0) {
                        showTopDishesInRecommendation();
                    }
                } catch (error) {
                    addMessage('导入失败：文件读取错误。', 'bot');
                }
            };
            reader.readAsText(file);
            fileInput.value = '';
        }

        // 页面加载时自动从custom-dishes.json加载自定义菜品
        async function loadExternalCustomDishes() {
            try {
                const response = await fetch('custom-dishes.json');
                if (response.ok) {
                    const data = await response.json();
                    if (data.dishes && Array.isArray(data.dishes)) {
                        data.dishes.forEach(dish => {
                            if (!dish.name) return;
                            
                            const existingIndex = dishes['家常菜'].findIndex(d => d.name === dish.name);
                            
                            if (existingIndex === -1) {
                                if (!dishes['家常菜']) {
                                    dishes['家常菜'] = [];
                                }
                                dishes['家常菜'].push(dish);
                            } else {
                                // 更新已存在的菜品信息
                                dishes['家常菜'][existingIndex] = dish;
                            }
                            
                            if (data.ratings && data.ratings[dish.name]) {
                                dishRatings[dish.name] = data.ratings[dish.name];
                            }
                        });
                        saveCustomDishes();
                        saveDishRatings();
                        console.log('已加载外部自定义菜品');
                    }
                }
            } catch (error) {
                // 外部文件不存在，忽略错误
            }
        }

        // 监听文件选择
        document.getElementById('dishImageUpload').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const fileName = e.target.files[0].name;
                document.getElementById('fileName').textContent = fileName;
            }
        });

        function showNutrition(dishName) {
            const dish = Object.values(dishes).flat().find(d => d.name === dishName);
            if (!dish) return;
            
            const n = dish.nutrition;
            const tip = n.calories < 200 ? '热量较低，适合减肥期间食用' : n.calories < 300 ? '热量适中，营养均衡' : '热量较高，适合补充能量';
            
            const html = `
                <h3 class="modal-title">📊 ${dish.name} 营养信息</h3>
                <div class="nutrition-grid">
                    <div class="nutrition-card">
                        <div class="value">${n.calories}</div>
                        <div class="label">卡路里 (kcal)</div>
                    </div>
                    <div class="nutrition-card">
                        <div class="value">${n.protein}g</div>
                        <div class="label">蛋白质</div>
                    </div>
                    <div class="nutrition-card">
                        <div class="value">${n.fat}g</div>
                        <div class="label">脂肪</div>
                    </div>
                    <div class="nutrition-card">
                        <div class="value">${n.carbs}g</div>
                        <div class="label">碳水化合物</div>
                    </div>
                </div>
                <div class="nutrition-tip">
                    💡 这道菜${tip}
                </div>
            `;
            
            document.getElementById('nutritionModalBody').innerHTML = html;
            document.getElementById('nutritionModal').classList.add('active');
        }

        function showRecipe(dishName) {
            const dish = Object.values(dishes).flat().find(d => d.name === dishName);
            if (!dish) return;
            
            let ingredientsHtml = dish.ingredients.map(ing => `<span class="ingredient-tag">${ing}</span>`).join('');
            
            let stepsHtml = dish.steps.map((step, idx) => `
                <div class="recipe-step">
                    <div class="recipe-step-number">${idx + 1}</div>
                    <div class="recipe-step-content">
                        <h4>${step.title}</h4>
                        <p>${step.content}</p>
                    </div>
                </div>
            `).join('');
            
            const html = `
                <h3 class="modal-title">👨‍🍳 ${dish.name} 做法</h3>
                <div class="recipe-ingredients">
                    <h4>🥬 食材准备</h4>
                    <div class="ingredient-tags">${ingredientsHtml}</div>
                </div>
                <div class="recipe-steps">
                    ${stepsHtml}
                </div>
                <div class="recipe-tip">
                    💡 小贴士：记得控制火候，这样做出来的菜更美味！
                </div>
            `;
            
            document.getElementById('recipeModalBody').innerHTML = html;
            document.getElementById('recipeModal').classList.add('active');
        }
    </script>

    <div id="nutritionModal" class="modal" onclick="closeNutritionModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeNutritionModal()">&times;</span>
            <div id="nutritionModalBody"></div>
        </div>
    </div>

    <div id="recipeModal" class="modal" onclick="closeRecipeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeRecipeModal()">&times;</span>
            <div id="recipeModalBody"></div>
        </div>
    </div>

    <div id="ingredientsModal" class="modal" onclick="closeIngredientsModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeIngredientsModal()">&times;</span>
            <div id="ingredientsModalBody"></div>
        </div>
    </div>

    <div id="suitableModal" class="modal" onclick="closeSuitableModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeSuitableModal()">&times;</span>
            <div id="suitableModalBody"></div>
        </div>
    </div>
