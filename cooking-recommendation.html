<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能做菜推荐助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .chat-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 15px;
        }

        .chat-header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            color: #999;
            font-size: 14px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 15px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.bot .message-content {
            background: #f0f0f0;
            color: #333;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .result-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-header h2 {
            color: #667eea;
            font-size: 20px;
        }

        .card-header .icon {
            font-size: 24px;
        }

        .dish-recommendation {
            flex: 1;
            overflow-y: auto;
        }

        .dish-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }

        .dish-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .dish-card.selected {
            border: 2px solid #667eea;
            background: linear-gradient(135deg, #e8eaf6 0%, #c5cae9 100%);
        }

        .dish-card h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .dish-card .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .dish-card .description {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .nutrition-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .nutrition-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .nutrition-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .nutrition-item .label {
            color: #999;
            font-size: 12px;
        }

        .recipe-steps {
            flex: 1;
            overflow-y: auto;
        }

        .step {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .step-number {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .step-content {
            flex: 1;
        }

        .step-content h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .step-content p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .ingredients-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .ingredient {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
        }

        .quick-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .quick-button {
            background: #f0f0f0;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }

        .quick-button:hover {
            background: #667eea;
            color: white;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .dish-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .dish-action-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .dish-action-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .dish-image-container {
            width: 100%;
            height: 200px;
            margin-bottom: 10px;
            position: relative;
        }

        .dish-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .dish-image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .dish-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            transition: transform 0.3s ease;
        }

        .dish-card:hover .dish-image {
            transform: scale(1.05);
        }

        .video-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 15px;
            cursor: pointer;
            border: none;
        }

        .video-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .video-link .icon {
            font-size: 20px;
        }

        .video-container {
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        .video-container iframe {
            width: 100%;
            height: 300px;
            border: none;
            display: block;
        }

        .step-video {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .step-video a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .step-video a:hover {
            text-decoration: underline;
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .image-gallery img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .image-gallery img:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-section">
            <div class="chat-header">
                <h1>🍳 智能做菜推荐助手</h1>
                <p>告诉我你想吃什么，我来帮你推荐！</p>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-content">
                        你好！我是你的智能做菜助手 👨‍🍳<br><br>
                        我可以帮你：<br>
                        🍽️ 推荐今天吃什么<br>
                        🥗 分析营养搭配<br>
                        📖 提供详细做法<br><br>
                        你可以说：<br>
                        "推荐几个家常菜"<br>
                        "我想吃清淡的"<br>
                        "这道菜的营养怎么样？"<br>
                        "怎么做这道菜？"
                    </div>
                </div>
            </div>
            
            <div class="quick-buttons">
                <button class="quick-button" onclick="sendQuickMessage('推荐几个家常菜')">推荐家常菜</button>
                <button class="quick-button" onclick="sendQuickMessage('我想吃清淡的')">清淡菜</button>
                <button class="quick-button" onclick="sendQuickMessage('推荐辣菜')">辣菜</button>
                <button class="quick-button" onclick="sendQuickMessage('今天想吃肉')">肉菜</button>
                <button class="quick-button" onclick="sendQuickMessage('推荐素菜')">素菜</button>
                <button class="quick-button" onclick="sendQuickMessage('快手菜')">快手菜</button>
            </div>
            
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入你想吃的菜或询问营养做法..." onkeypress="handleKeyPress(event)">
                <button class="send-button" onclick="sendMessage()">发送</button>
            </div>
        </div>
        
        <div class="result-section">
            <div class="card dish-recommendation">
                <div class="card-header">
                    <span class="icon">🍽️</span>
                    <h2>菜品推荐</h2>
                </div>
                <div id="dishList">
                    <div class="empty-state">
                        <div class="icon">🥘</div>
                        <p>开始对话，获取菜品推荐</p>
                    </div>
                </div>
                <div class="loading" id="loadingDish">
                    <div class="spinner"></div>
                    <p>正在为你推荐菜品...</p>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="icon">🥗</span>
                    <h2>营养分析</h2>
                </div>
                <div id="nutritionInfo">
                    <div class="empty-state">
                        <div class="icon">📊</div>
                        <p>选择菜品查看营养信息</p>
                    </div>
                </div>
            </div>
            
            <div class="card recipe-steps">
                <div class="card-header">
                    <span class="icon">📖</span>
                    <h2>做法步骤</h2>
                </div>
                <div id="recipeSteps">
                    <div class="empty-state">
                        <div class="icon">👨‍🍳</div>
                        <p>选择菜品查看详细做法</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dishes = {
            家常菜: [
                {
                    name: '番茄炒蛋',
                    tags: ['家常', '快手', '清淡'],
                    description: '经典家常菜，酸甜可口，营养丰富，老少皆宜。',
                    nutrition: { calories: 180, protein: 12, fat: 10, carbs: 8 },

                        { title: '炒番茄', content: '锅中再放少许油，放入番茄块翻炒，加少许糖提鲜。', image: '🍅' },

                    image: 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=tomato%20and%20egg%20stir%20fry%20chinese%20dish&image_size=landscape_4_3',

                {

                {

                }
            ],
            清淡菜: [
                {
                    name: '清蒸鲈鱼',
                    tags: ['清淡', '海鲜', '营养'],

                },
                {
                    name: '蒜蓉西兰花',

                    ingredients: ['西兰花 1颗', '蒜 5瓣', '盐 适量', '蚝油 1勺', '食用油 适量'],

        let currentDish = null;
        let currentCategory = '家常菜';

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            setTimeout(() => {
                processMessage(message);
            }, 500);
        }

        function sendQuickMessage(message) {
            document.getElementById('chatInput').value = message;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function addMessage(content, type) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function processMessage(message) {
            const lowerMessage = message.toLowerCase();
            let response = '';
            let category = '';
            
            if (lowerMessage.includes('家常') || lowerMessage.includes('普通')) {
                category = '家常菜';
                response = '好的！我为你推荐几道经典家常菜：';
            } else if (lowerMessage.includes('清淡') || lowerMessage.includes('养生') || lowerMessage.includes('健康')) {
                category = '清淡菜';
                response = '清淡菜系很适合养生，推荐这些：';
            } else if (lowerMessage.includes('辣') || lowerMessage.includes('川菜') || lowerMessage.includes('麻辣')) {
                category = '辣菜';
                response = '喜欢辣味？这些川菜绝对过瘾：';
            } else if (lowerMessage.includes('肉') || lowerMessage.includes('荤')) {
                category = '肉菜';
                response = '肉食爱好者看过来，推荐这些：';
            } else if (lowerMessage.includes('素') || lowerMessage.includes('蔬菜')) {
                category = '素菜';
                response = '素菜也很美味，推荐这些：';
            } else if (lowerMessage.includes('快手') || lowerMessage.includes('简单') || lowerMessage.includes('快')) {
                category = '快手菜';
                response = '快手菜来啦，简单易做：';
            } else if (lowerMessage.includes('营养') || lowerMessage.includes('热量') || lowerMessage.includes('蛋白质')) {
                if (currentDish) {
                    showNutritionInChat(currentDish);
                    return;
                } else {
                    response = '请先选择一道菜，我才能为你分析营养信息哦！你可以先说"推荐几个家常菜"';
                }
            } else if (lowerMessage.includes('做法') || lowerMessage.includes('怎么做') || lowerMessage.includes('步骤')) {
                if (currentDish) {
                    showRecipeInChat(currentDish);
                    return;
                } else {
                    response = '请先选择一道菜，我才能告诉你做法哦！你可以先说"推荐几个家常菜"';
                }
            } else if (lowerMessage.includes('食材') || lowerMessage.includes('材料')) {
                if (currentDish) {
                    showIngredientsInChat(currentDish);
                    return;
                } else {
                    response = '请先选择一道菜，我才能告诉你需要什么食材哦！你可以先说"推荐几个家常菜"';
                }
            } else {
                category = '家常菜';
                response = '好的！我为你推荐几道菜：';
            }
            
            addMessage(response, 'bot');
            
            if (category) {
                currentCategory = category;
                showLoading(true);
                
                setTimeout(() => {
                    showDishRecommendations(category);
                    showLoading(false);
                }, 1000);
            }
        }

        function showNutritionInChat(dish) {
            const n = dish.nutrition;
            const message = `📊 **${dish.name}** 的营养信息：<br><br>` +
                `🔥 卡路里：${n.calories} kcal<br>` +
                `💪 蛋白质：${n.protein}g<br>` +
                `🥓 脂肪：${n.fat}g<br>` +
                `🍚 碳水化合物：${n.carbs}g<br><br>` +
                `这道菜${n.calories < 200 ? '热量较低，适合减肥期间食用' : n.calories < 300 ? '热量适中，营养均衡' : '热量较高，适合补充能量'}！`;
            
            addMessage(message, 'bot');
            showNutrition(dish);
        }

        function showRecipeInChat(dish) {
            let message = `👨‍🍳 **${dish.name}** 的做法：<br><br>`;
            dish.steps.forEach((step, index) => {
                message += `**第${index + 1}步：${step.title}**<br>${step.content}<br><br>`;
            });
            message += `💡 小贴士：记得控制火候，这样做出来的菜更美味！`;
            
            addMessage(message, 'bot');
            showRecipe(dish);
        }

        function showIngredientsInChat(dish) {
            let message = `🥬 **${dish.name}** 需要的食材：<br><br>`;
            dish.ingredients.forEach(ing => {
                message += `• ${ing}<br>`;
            });
            message += `<br>准备好这些食材就可以开始做啦！需要我告诉你具体做法吗？`;
            
            addMessage(message, 'bot');
        }

        function showLoading(show) {
            const loading = document.getElementById('loadingDish');
            loading.classList.toggle('active', show);
        }

        function showDishRecommendations(category) {
            const dishList = document.getElementById('dishList');
            const categoryDishes = dishes[category] || dishes['家常菜'];
            
            dishList.innerHTML = categoryDishes.map((dish, index) => `
                <div class="dish-card" id="dish-${index}" onclick="selectDish('${category}', ${index})">
                    <div class="dish-image-container">
                        <img src="${dish.image}" alt="${dish.name}" class="dish-image" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'dish-image-placeholder\' style=\'background: linear-gradient(135deg, ${dish.color} 0%, ${dish.color}dd 100%);\'>🍽️</div>'">
                    </div>
                    <h3>${dish.name}</h3>
                    <div class="tags">
                        ${dish.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <p class="description">${dish.description}</p>
                    <div class="dish-buttons">
                        <button class="dish-action-btn" onclick="event.stopPropagation(); askNutrition('${category}', ${index})">📊 查看营养</button>
                        <button class="dish-action-btn" onclick="event.stopPropagation(); askRecipe('${category}', ${index})">📖 查看做法</button>
                    </div>
                </div>
            `).join('');
            
            // 自动选择第一道菜并显示营养和做法
            if (categoryDishes.length > 0) {
                selectDish(category, 0);
            }
        }

        function selectDish(category, index) {
            const dish = dishes[category][index];
            currentDish = dish;
            
            // 移除所有选中状态
            document.querySelectorAll('.dish-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // 添加选中状态
            const selectedCard = document.getElementById(`dish-${index}`);
            if (selectedCard) {
                selectedCard.classList.add('selected');
            }
            
            // 自动显示营养和做法
            showNutrition(dish);
            showRecipe(dish);
            
            addMessage(`你选择了【${dish.name}】！这是${dish.description}`, 'bot');
        }

        function askNutrition(category, index) {
            const dish = dishes[category][index];
            currentDish = dish;
            addMessage(`${dish.name}的营养怎么样？`, 'user');
            setTimeout(() => {
                showNutritionInChat(dish);
            }, 500);
        }

        function askRecipe(category, index) {
            const dish = dishes[category][index];
            currentDish = dish;
            addMessage(`${dish.name}怎么做？`, 'user');
            setTimeout(() => {
                showRecipeInChat(dish);
            }, 500);
        }

        function showNutrition(dish) {
            const nutritionDiv = document.getElementById('nutritionInfo');
            const n = dish.nutrition;
            
            nutritionDiv.innerHTML = `
                <div class="nutrition-info">
                    <div class="nutrition-item">
                        <div class="value">${n.calories}</div>
                        <div class="label">卡路里 (kcal)</div>
                    </div>
                    <div class="nutrition-item">
                        <div class="value">${n.protein}g</div>
                        <div class="label">蛋白质</div>
                    </div>
                    <div class="nutrition-item">
                        <div class="value">${n.fat}g</div>
                        <div class="label">脂肪</div>
                    </div>
                    <div class="nutrition-item">
                        <div class="value">${n.carbs}g</div>
                        <div class="label">碳水化合物</div>
                    </div>
                </div>
            `;
        }

        function showRecipe(dish) {
            const recipeDiv = document.getElementById('recipeSteps');
            
            recipeDiv.innerHTML = `
                <div class="ingredients-list">
                    <strong>食材：</strong>
                    ${dish.ingredients.map(ing => `<span class="ingredient">${ing}</span>`).join('')}
                </div>
                <div style="margin-top: 15px;">
                    ${dish.steps.map((step, index) => `
                        <div class="step">
                            <div class="step-number">${index + 1}</div>
                            <div class="step-content">
                                <h4>${step.image} ${step.title}</h4>
                                <p>${step.content}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
    </script>
</body>
</html>
